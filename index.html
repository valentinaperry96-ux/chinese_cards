<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Китайские карточки — Избранное</title>
    <style>
        :root {
            --bg: #f5f0eb;
            --card-bg: #fffef9;
            --text: #2c2416;
            --text-light: #5c5347;
            --accent: #c44536;
            --accent-hover: #a6362a;
            --border: #d9cfc0;
            --shadow: 0 4px 20px rgba(0,0,0,0.08);
            --shadow-hover: 0 8px 32px rgba(0,0,0,0.13);
            --flip-duration: 0.5s;
            --card-width: 340px;
            --card-height: 440px;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Segoe UI','Noto Sans','Noto Sans SC',system-ui,sans-serif;
            background: var(--bg);
            min-height: 100vh;
            display:flex; flex-direction:column; align-items:center;
            padding:20px 16px 40px;
            -webkit-tap-highlight-color: transparent;
            user-select: none; -webkit-user-select: none;
        }
        header { text-align:center; margin-bottom:6px; }
        header h1 { font-size:1.7rem; font-weight:700; color:var(--text); }
        .subtitle { font-size:0.85rem; color:var(--text-light); margin-top:2px; }

        .mode-switch { display:flex; gap:10px; margin:12px 0 6px; }
        .mode-btn {
            background: #fff; border:1.5px solid var(--border); border-radius:24px;
            padding:8px 20px; font-size:0.9rem; font-weight:600; cursor:pointer;
            transition: all 0.2s; color: var(--text);
        }
        .mode-btn.active { background: var(--accent); color:#fff; border-color:var(--accent); box-shadow:0 3px 12px rgba(196,69,54,0.3); }

        .card-stage { perspective:1000px; margin:10px 0 18px; width:var(--card-width); height:var(--card-height); max-width:92vw; position: relative; }
        .card-inner {
            width:100%; height:100%; position:relative;
            transition:transform var(--flip-duration) cubic-bezier(0.4,0,0.2,1);
            transform-style:preserve-3d; cursor:pointer;
        }
        .card-inner.flipped { transform:rotateY(180deg); }
        .card-face {
            position:absolute; inset:0; border-radius:20px; background:var(--card-bg);
            box-shadow:var(--shadow); backface-visibility:hidden; -webkit-backface-visibility:hidden;
            display:flex; flex-direction:column; align-items:center; justify-content:center;
            padding:30px 24px; border:1px solid rgba(0,0,0,0.06);
        }
        .card-face.back { transform:rotateY(180deg); background:#fdfaf3; border:1px solid rgba(180,140,100,0.18); }
        .card-inner:not(.flipped):hover .card-face.front { box-shadow:var(--shadow-hover); }
        .card-inner.flipped .card-face.back { box-shadow:var(--shadow-hover); }

        .card-face.front .char { font-size:5.5rem; font-weight:700; color:#1a1a1a; line-height:1.1; text-align:center; word-break:keep-all; }
        .card-face.front .char.multi { font-size:3.2rem; }
        .card-face.front .char.long { font-size:2.2rem; }
        .card-face.front .tap-hint { position:absolute; bottom:18px; font-size:0.7rem; color:#c4b8a5; }
        .card-face.front .favorite-btn {
            position: absolute; top: 16px; right: 20px;
            font-size: 2rem; cursor: pointer; color: #d4a574;
            transition: 0.2s; line-height: 1; user-select: none;
        }
        .card-face.front .favorite-btn.active { color: #c44536; }
        .card-face.back .pinyin { font-size:2rem; font-weight:600; color:#c44536; margin-bottom:12px; text-align:center; }
        .card-face.back .translation { font-size:1.2rem; color:#3d3226; text-align:center; line-height:1.5; font-weight:500; }
        .card-face.back .char-sm { font-size:1rem; color:#9a8b75; margin-bottom:16px; text-align:center; }

        .nav-row {
            display:flex; align-items:center; gap:16px; flex-wrap:wrap; justify-content:center; margin-top:12px;
        }
        .btn {
            padding:11px 28px; border-radius:28px; border:none; font-size:1rem; font-weight:600;
            cursor:pointer; letter-spacing:0.02em; transition:all 0.2s; font-family:inherit;
            display:flex; align-items:center; gap:6px; background:#fff; color:var(--text);
            border:1.5px solid var(--border); box-shadow:0 2px 8px rgba(0,0,0,0.04);
        }
        .btn:hover { background:#f7f3eb; border-color:#c4b49a; box-shadow:0 4px 14px rgba(0,0,0,0.07); }
        .btn:active { background:#ebe3d6; transform:scale(0.96); }
        .btn.accent { background:var(--accent); color:#fff; border-color:var(--accent); box-shadow:0 4px 14px rgba(196,69,54,0.3); }
        .btn.accent:hover { background:var(--accent-hover); }
        .counter { font-size:0.9rem; color:var(--text-light); font-weight:500; min-width:60px; text-align:center; }
        .btn-icon { font-size:1.2rem; }
        .empty-msg { font-size:1.5rem; color: #b0a090; text-align:center; padding: 40px 20px; }

        .progress-bar {
            width: 260px; max-width: 70%; height: 6px; background: #e0d6c8; border-radius: 10px; margin: 10px 0;
            overflow: hidden;
        }
        .progress-fill { height: 100%; background: var(--accent); border-radius: 10px; transition: width 0.3s; }

        .kbd-hint { margin-top:16px; font-size:0.75rem; color:#b5a898; text-align:center; }
        .kbd-hint span { display:inline-block; background:#e8e0d5; border-radius:5px; padding:2px 8px; margin:0 2px; font-weight:600; color:#6b5e4e; font-size:0.7rem; border:1px solid #d5ccbc; }

        @media (max-width:480px) {
            :root { --card-width:290px; --card-height:380px; }
            .card-face.front .char { font-size:4rem; }
            .card-face.front .char.multi { font-size:2.5rem; }
            .card-face.front .char.long { font-size:1.8rem; }
            .card-face.back .pinyin { font-size:1.5rem; }
            .card-face.back .translation { font-size:1rem; }
            .btn { padding:10px 18px; font-size:0.9rem; }
            .mode-btn { padding:6px 14px; font-size:0.8rem; }
        }
    </style>
</head>
<body>

    <header>
        <h1>📚 Китайские карточки</h1>
        <p class="subtitle">нажми на карточку, чтобы увидеть пиньинь и перевод</p>
    </header>

    <div class="mode-switch">
        <button class="mode-btn active" data-mode="all">Все слова</button>
        <button class="mode-btn" data-mode="favorites">⭐ Повторить</button>
    </div>

    <div class="card-stage" id="cardStage">
        <div class="card-inner" id="cardInner">
            <div class="card-face front">
                <span class="favorite-btn" id="favoriteBtn">☆</span>
                <span class="char" id="charDisplay"></span>
                <span class="tap-hint">👆 нажми</span>
            </div>
            <div class="card-face back">
                <span class="char-sm" id="charSm"></span>
                <span class="pinyin" id="pinyinDisplay"></span>
                <span class="translation" id="transDisplay"></span>
            </div>
        </div>
    </div>

    <div class="progress-bar">
        <div class="progress-fill" id="progressFill" style="width:0%"></div>
    </div>

    <div class="nav-row">
        <button class="btn" id="btnPrev"><span class="btn-icon">◀</span> Назад</button>
        <span class="counter" id="counter">1 / 1</span>
        <button class="btn" id="btnNext">Вперёд <span class="btn-icon">▶</span></button>
        <button class="btn accent" id="btnFlip">🔄 Перевернуть</button>
    </div>

    <p class="kbd-hint">
        ⌨ <span>←</span> <span>→</span> переключение &nbsp;|&nbsp; <span>пробел</span> переворот
    </p>

            // Убираем повторы по первому элементу (иероглиф)
            const uniqueWords = [];
            const seen = new Set();
            for (const w of allWords) {
                if (!seen.has(w[0])) {
                    seen.add(w[0]);
                    uniqueWords.push(w);
                }
            }

            // Избранное (из localStorage)
            let favorites = JSON.parse(localStorage.getItem('flashcardFavorites') || '[]');
            let mode = 'all'; // 'all' или 'favorites'
            let currentIndex = 0;
            let isFlipped = false;

            const cardInner = document.getElementById('cardInner');
            const charDisplay = document.getElementById('charDisplay');
            const charSm = document.getElementById('charSm');
            const pinyinDisplay = document.getElementById('pinyinDisplay');
            const transDisplay = document.getElementById('transDisplay');
            const counter = document.getElementById('counter');
            const progressFill = document.getElementById('progressFill');
            const favoriteBtn = document.getElementById('favoriteBtn');

            function getCurrentWordList() {
                return mode === 'all' ? uniqueWords : favorites;
            }

            function getCurrentWord() {
                const list = getCurrentWordList();
                return list[currentIndex] || null;
            }

            function charSizeClass(hanzi) {
                const len = hanzi.length;
                if (len <= 2) return '';
                if (len <= 4) return 'multi';
                return 'long';
            }

            function updateFavoriteButton() {
                const word = getCurrentWord();
                if (!word) return;
                const isFav = favorites.some(w => w[0] === word[0]);
                favoriteBtn.textContent = isFav ? '★' : '☆';
                favoriteBtn.classList.toggle('active', isFav);
            }

            function renderCard() {
                const word = getCurrentWord();
                if (!word) {
                    // нет слов в текущем списке
                    charDisplay.textContent = mode === 'favorites' ? '⭐' : '—';
                    charSm.textContent = '';
                    pinyinDisplay.textContent = 'Нет слов';
                    transDisplay.textContent = mode === 'favorites' ? 'Добавьте слова в избранное' : 'Список пуст';
                    counter.textContent = `0 / 0`;
                    progressFill.style.width = '0%';
                    favoriteBtn.style.display = 'none';
                    isFlipped = false;
                    cardInner.classList.remove('flipped');
                    return;
                }
                favoriteBtn.style.display = 'block';
                const hanzi = word[0], pinyin = word[1], trans = word[2];
                charDisplay.textContent = hanzi;
                charDisplay.className = 'char ' + charSizeClass(hanzi);
                charSm.textContent = hanzi;
                pinyinDisplay.textContent = pinyin;
                transDisplay.textContent = trans;
                isFlipped = false;
                cardInner.classList.remove('flipped');
                const list = getCurrentWordList();
                counter.textContent = `${currentIndex + 1} / ${list.length}`;
                const progress = list.length ? ((currentIndex + 1) / list.length) * 100 : 0;
                progressFill.style.width = progress + '%';
                updateFavoriteButton();
            }

            function flipCard() {
                if (!getCurrentWord()) return;
                isFlipped = !isFlipped;
                cardInner.classList.toggle('flipped', isFlipped);
            }

            function goToCard(index) {
                const list = getCurrentWordList();
                if (list.length === 0) {
                    currentIndex = 0;
                    renderCard();
                    return;
                }
                if (index < 0) index = list.length - 1;
                if (index >= list.length) index = 0;
                currentIndex = index;
                isFlipped = false;
                renderCard();
            }

            function switchMode(newMode) {
                if (mode === newMode) return;
                mode = newMode;
                currentIndex = 0;
                document.querySelectorAll('.mode-btn').forEach(btn => {
                    btn.classList.toggle('active', btn.dataset.mode === mode);
                });
                renderCard();
            }

            function toggleFavorite() {
                const word = getCurrentWord();
                if (!word) return;
                const index = favorites.findIndex(w => w[0] === word[0]);
                if (index === -1) {
                    favorites.push([...word]);
                } else {
                    favorites.splice(index, 1);
                }
                localStorage.setItem('flashcardFavorites', JSON.stringify(favorites));
                updateFavoriteButton();

                // Если мы в режиме избранного и удалили текущее слово, перейти к следующему
                if (mode === 'favorites') {
                    if (favorites.length === 0) {
                        currentIndex = 0;
                        renderCard();
                    } else {
                        // если удалили последнее слово, индекс может выйти за границы
                        if (currentIndex >= favorites.length) {
                            currentIndex = favorites.length - 1;
                        }
                        renderCard();
                    }
                }
            }

            // Обработчики
            document.getElementById('cardStage').addEventListener('click', (e) => {
                // Если клик по кнопке избранного, не переворачиваем карточку
                if (e.target.closest('.favorite-btn')) return;
                flipCard();
            });
            favoriteBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                toggleFavorite();
            });
            document.getElementById('btnFlip').addEventListener('click', flipCard);
            document.getElementById('btnPrev').addEventListener('click', () => goToCard(currentIndex - 1));
            document.getElementById('btnNext').addEventListener('click', () => goToCard(currentIndex + 1));

            document.querySelectorAll('.mode-btn').forEach(btn => {
                btn.addEventListener('click', () => switchMode(btn.dataset.mode));
            });

            document.addEventListener('keydown', e => {
                if (e.key === 'ArrowLeft') { e.preventDefault(); goToCard(currentIndex - 1); }
                else if (e.key === 'ArrowRight') { e.preventDefault(); goToCard(currentIndex + 1); }
                else if (e.key === ' ' || e.code === 'Space') { e.preventDefault(); flipCard(); }
            });

            // Инициализация
            renderCard();
        })();
