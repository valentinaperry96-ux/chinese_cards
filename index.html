    <style>
        :root {
            --bg: #f5f0eb;
            --card-bg: #fffef9;
            --text: #2c2416;
            --text-light: #5c5347;
            --accent: #c44536;
            --accent-hover: #a6362a;
            --border: #d9cfc0;
            --shadow: 0 4px 20px rgba(0,0,0,0.08);
            --shadow-hover: 0 8px 32px rgba(0,0,0,0.13);
            --card-width: 340px;
            --card-height: 440px;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Segoe UI','Noto Sans','Noto Sans SC',system-ui,sans-serif;
            background: var(--bg);
            min-height: 100vh;
            display:flex; flex-direction:column; align-items:center;
            padding:20px 16px 40px;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        header { text-align:center; margin-bottom:6px; }
        header h1 { font-size:1.7rem; font-weight:700; color:var(--text); }
        .subtitle { font-size:0.85rem; color:var(--text-light); margin-top:2px; }
        .mode-switch { display:flex; gap:10px; margin:12px 0 6px; }
        .mode-btn {
            background: #fff; border:1.5px solid var(--border); border-radius:24px;
            padding:8px 20px; font-size:0.9rem; font-weight:600; cursor:pointer;
            transition: all 0.2s; color: var(--text);
        }
        .mode-btn.active { background: var(--accent); color:#fff; border-color:var(--accent); }
        .card-stage { perspective:1000px; margin:10px 0 18px; width:var(--card-width); height:var(--card-height); max-width:92vw; position: relative; }
        .card-inner {
            width:100%; height:100%; position:relative;
            transition:transform 0.5s cubic-bezier(0.4,0,0.2,1);
            transform-style:preserve-3d; cursor:pointer;
        }
        .card-inner.flipped { transform:rotateY(180deg); }
        .card-face {
            position:absolute; inset:0; border-radius:20px; background:var(--card-bg);
            box-shadow:var(--shadow); backface-visibility:hidden; -webkit-backface-visibility:hidden;
            display:flex; flex-direction:column; align-items:center; justify-content:center;
            padding:30px 24px; border:1px solid rgba(0,0,0,0.06);
        }
        .card-face.back { transform:rotateY(180deg); background:#fdfaf3; }
        .card-face.front .char { font-size:5.5rem; font-weight:700; color:#1a1a1a; line-height:1.1; }
        .card-face.front .char.multi { font-size:3.2rem; }
        .card-face.front .char.long { font-size:2.2rem; }
        .card-face.front .pinyin-big { font-size:2.2rem; font-weight:600; color:#c44536; margin-bottom:12px; }
        .card-face.front .trans-big { font-size:1.4rem; color:#3d3226; }
        .card-face.front .tap-hint { position:absolute; bottom:18px; font-size:0.7rem; color:#c4b8a5; }
        .card-face.front .favorite-btn {
            position: absolute; top: 16px; right: 20px;
            font-size: 2rem; cursor: pointer; color: #d4a574;
        }
        .card-face.front .favorite-btn.active { color: #c44536; }
        .card-face.back .pinyin { font-size:2rem; font-weight:600; color:#c44536; margin-bottom:12px; }
        .card-face.back .translation { font-size:1.2rem; color:#3d3226; text-align:center; }
        .card-face.back .char-sm { font-size:1rem; color:#9a8b75; margin-bottom:16px; }
        .nav-row { display:flex; gap:16px; flex-wrap:wrap; justify-content:center; margin-top:12px; }
        .btn {
            padding:11px 28px; border-radius:28px; border:1.5px solid var(--border);
            background:#fff; font-size:1rem; font-weight:600; cursor:pointer;
        }
        .btn.accent { background:var(--accent); color:#fff; border-color:var(--accent); }
        .counter { font-size:0.9rem; color:var(--text-light); min-width:60px; text-align:center; }
        .progress-bar { width: 260px; height: 6px; background: #e0d6c8; border-radius: 10px; margin: 10px 0; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--accent); transition: width 0.3s; }
    </style>
</head>

                <span class="pinyin" id="pinyinDisplay"></span>
                <span class="translation" id="transDisplay"></span>
            </div>
        </div>
    </div>

                const [hanzi, pinyin, trans] = word;

                charSm.textContent = hanzi;
                pinyinDisplay.textContent = pinyin;
                transDisplay.textContent = trans;

                if (mode === 'reading') {
                    mainDisplay.style.display = 'block';
                    pinyinBig.style.display = 'none';
                    transBig.style.display = 'none';
                    mainDisplay.textContent = hanzi;
                    mainDisplay.className = 'char ' + (hanzi.length <= 2 ? '' : (hanzi.length <= 4 ? 'multi' : 'long'));
                } else {
                    mainDisplay.style.display = 'none';
                    pinyinBig.style.display = 'block';
                    transBig.style.display = 'block';
                    pinyinBig.textContent = pinyin;
                    transBig.textContent = trans;
                }

                isFlipped = false;
                cardInner.classList.remove('flipped');
                counter.textContent = `${currentIndex+1} / ${total}`;
                progressFill.style.width = ((currentIndex+1)/total*100) + '%';
                updateFavoriteButton();
            }

            function flipCard() {
                isFlipped = !isFlipped;
                cardInner.classList.toggle('flipped', isFlipped);
            }

            function goToCard(index) {
                if (index < 0) index = total-1;
                if (index >= total) index = 0;
                currentIndex = index;
                renderCard();
            }

            function switchMode(newMode) {
                mode = newMode;
                document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
                document.querySelector(`.mode-btn[data-mode="${mode}"]`).classList.add('active');
                renderCard();
            }

            favoriteBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                const word = words[currentIndex];
                const idx = favorites.findIndex(w => w[0] === word[0]);
                if (idx === -1) favorites.push([...word]);
                else favorites.splice(idx,1);
                localStorage.setItem('repeatFavorites', JSON.stringify(favorites));
                updateFavoriteButton();
            });

            document.getElementById('cardStage').addEventListener('click', flipCard);
            document.getElementById('btnFlip').addEventListener('click', flipCard);
            document.getElementById('btnPrev').addEventListener('click', () => goToCard(currentIndex-1));
            document.getElementById('btnNext').addEventListener('click', () => goToCard(currentIndex+1));

            document.querySelectorAll('.mode-btn').forEach(btn => {
                btn.addEventListener('click', () => switchMode(btn.dataset.mode));
            });

            document.addEventListener('keydown', e => {
                if (e.key === 'ArrowLeft') { e.preventDefault(); goToCard(currentIndex-1); }
                else if (e.key === 'ArrowRight') { e.preventDefault(); goToCard(currentIndex+1); }
                else if (e.key === ' ' || e.code === 'Space') { e.preventDefault(); flipCard(); }
            });

            renderCard();
        })();
    </script>
</body>
</html>
