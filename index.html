<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Китайские карточки — Избранное + игра</title>
    <style>
        :root {
            --bg: #f5f0eb;
            --card-bg: #fffef9;
            --text: #2c2416;
            --text-light: #5c5347;
            --accent: #c44536;
            --accent-hover: #a6362a;
            --border: #d9cfc0;
            --shadow: 0 4px 20px rgba(0,0,0,0.08);
            --game-green: #2c7a47;
            --game-red: #c44536;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Segoe UI','Noto Sans','Noto Sans SC',system-ui,sans-serif;
            background: var(--bg);
            min-height: 100vh;
            display:flex; flex-direction:column; align-items:center;
            padding:20px 16px 40px;
        }
        header { text-align:center; margin-bottom:6px; }
        header h1 { font-size:1.7rem; font-weight:700; color:var(--text); }
        .subtitle { font-size:0.85rem; color:var(--text-light); margin-top:2px; }

        .mode-switch { display:flex; gap:10px; margin:12px 0 6px; }
        .mode-btn {
            background: #fff; border:1.5px solid var(--border); border-radius:24px;
            padding:8px 20px; font-size:0.9rem; font-weight:600; cursor:pointer;
            transition: all 0.2s; color: var(--text);
        }
        .mode-btn.active { background: var(--accent); color:#fff; border-color:var(--accent); box-shadow:0 3px 12px rgba(196,69,54,0.3); }

        .card-stage { perspective:1000px; margin:10px 0 18px; width:340px; height:440px; max-width:92vw; position: relative; }
        .card-inner {
            width:100%; height:100%; position:relative;
            transition:transform 0.5s cubic-bezier(0.4,0,0.2,1);
            transform-style:preserve-3d; cursor:pointer;
        }
        .card-inner.flipped { transform:rotateY(180deg); }
        .card-face {
            position:absolute; inset:0; border-radius:20px; background:var(--card-bg);
            box-shadow:var(--shadow); backface-visibility:hidden; -webkit-backface-visibility:hidden;
            display:flex; flex-direction:column; align-items:center; justify-content:center;
            padding:30px 24px; border:1px solid rgba(0,0,0,0.06);
        }
        .card-face.back { transform:rotateY(180deg); background:#fdfaf3; }
        .card-inner:not(.flipped):hover .card-face.front { box-shadow:0 8px 32px rgba(0,0,0,0.13); }
        .card-face.front .char { font-size:5.5rem; font-weight:700; color:#1a1a1a; }
        .card-face.front .char.multi { font-size:3.2rem; }
        .card-face.front .char.long { font-size:2.2rem; }
        .card-face.front .favorite-btn {
            position: absolute; top: 16px; right: 20px; font-size: 2rem; cursor:pointer;
            color: #d4a574; line-height:1;
        }
        .card-face.front .favorite-btn.active { color: var(--accent); }
        .card-face.back .pinyin { font-size:2rem; font-weight:600; color:var(--accent); margin-bottom:12px; }
        .card-face.back .translation { font-size:1.2rem; color:#3d3226; }
        .card-face.back .char-sm { font-size:1rem; color:#9a8b75; margin-bottom:16px; }

        .nav-row { display:flex; gap:16px; flex-wrap:wrap; justify-content:center; margin-top:12px; }
        .btn {
            padding:11px 28px; border-radius:28px; border:none; font-size:1rem; font-weight:600;
            cursor:pointer; background:#fff; border:1.5px solid var(--border);
            box-shadow:0 2px 8px rgba(0,0,0,0.04); transition:0.2s;
        }
        .btn:hover { background:#f7f3eb; }
        .btn.accent { background:var(--accent); color:#fff; border-color:var(--accent); }
        .btn.accent:hover { background:var(--accent-hover); }
        .counter { font-size:0.9rem; color:var(--text-light); font-weight:500; min-width:60px; text-align:center; }
        .progress-bar {
            width:260px; max-width:70%; height:6px; background:#e0d6c8; border-radius:10px; margin:10px 0;
        }
        .progress-fill { height:100%; background:var(--accent); border-radius:10px; transition: width 0.3s; }

        .favorites-list-container {
            width:100%; max-width:500px; margin:20px auto 0; background:#fefcf8;
            border-radius:18px; border:1px solid var(--border); padding:14px 16px;
            box-shadow:0 2px 12px rgba(0,0,0,0.04); display:none;
        }
        .favorites-list-container.visible { display:block; }
        .fav-list { display:flex; flex-wrap:wrap; gap:6px; max-height:200px; overflow-y:auto; margin-top:10px; }
        .fav-item { background:#fff; border:1px solid var(--border); border-radius:12px; padding:6px 10px; cursor:pointer; display:flex; align-items:center; gap:6px; font-size:0.9rem; }
        .fav-item:hover { background:#f3efe8; }
        .fav-item .fav-char { font-size:1.1rem; font-weight:600; }
        .fav-item .fav-pinyin { font-size:0.75rem; color:#5c5347; }
        .fav-item .remove-fav { color:var(--accent); font-weight:bold; margin-left:6px; cursor:pointer; }

        .game-panel {
            margin-top:16px; background:#f2efe8; border-radius:14px; padding:18px;
            text-align:center; display:none;
        }
        .game-panel.active { display:block; }
        .game-char { font-size:3rem; font-weight:700; margin-bottom:16px; }
        .options { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
        .option-btn {
            background:#fff; border:2px solid var(--border); border-radius:14px;
            padding:12px; font-size:1.1rem; cursor:pointer; transition:0.15s;
        }
        .option-btn:hover { background:#f0e8db; }
        .option-btn.correct { background:#c8e6c9; border-color:#2c7a47; }
        .option-btn.wrong { background:#ffcdd2; border-color:#c44536; }
        .game-score { margin-top:12px; font-weight:600; }
        .kbd-hint { margin-top:16px; font-size:0.75rem; color:#b5a898; text-align:center; }

        /* Адаптивность для телефонов */
        @media (max-width:480px) {
            .card-stage { width:290px; height:380px; }
            .card-face.front .char { font-size:4rem; }
            .card-face.front .char.multi { font-size:2.5rem; }
            .card-face.front .char.long { font-size:1.8rem; }
            .card-face.back .pinyin { font-size:1.5rem; }
            .card-face.back .translation { font-size:1rem; }
            .btn {
                padding:14px 24px;
                font-size:1.1rem;
            }
            .mode-btn {
                padding:10px 18px;
                font-size:1rem;
            }
            .fav-list {
                flex-direction: column;
                flex-wrap: nowrap;
                gap: 8px;
            }
            .fav-item {
                width: 100%;
            }
            .game-char { font-size:2.5rem; }
            .option-btn { font-size:1rem; padding:10px; }
        }
    </style>
</head>
<body>

<header>
    <h1>📚 Китайские карточки</h1>
    <p class="subtitle">нажми на карточку, чтобы увидеть пиньинь и перевод</p>
</header>

<div class="mode-switch">
    <button class="mode-btn active" data-mode="all">Все слова</button>
    <button class="mode-btn" data-mode="favorites">⭐ Повторить</button>
</div>

<div class="card-stage" id="cardStage">
    <div class="card-inner" id="cardInner">
        <div class="card-face front">
            <span class="favorite-btn" id="favoriteBtn">☆</span>
            <span class="char" id="charDisplay"></span>
            <span class="tap-hint" style="position:absolute; bottom:18px; font-size:0.7rem; color:#c4b8a5;">👆 нажми</span>
        </div>
        <div class="card-face back">
            <span class="char-sm" id="charSm"></span>
            <span class="pinyin" id="pinyinDisplay"></span>
            <span class="translation" id="transDisplay"></span>
        </div>
    </div>
</div>

<div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>

<div class="nav-row">
    <button class="btn" id="btnPrev">◀ Назад</button>
    <span class="counter" id="counter">1 / 1</span>
    <button class="btn" id="btnNext">Вперёд ▶</button>
    <button class="btn accent" id="btnFlip">🔄 Перевернуть</button>
</div>

<div class="favorites-list-container" id="favoritesListContainer">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h3>📋 Слова для повторения</h3>
        <button class="btn" id="toggleGameBtn">🎮 Игра: угадай пиньинь</button>
    </div>
    <div class="game-panel" id="gamePanel">
        <div class="game-char" id="gameChar"></div>
        <div class="options" id="optionsContainer"></div>
        <div class="game-score" id="gameScore"></div>
    </div>
    <div class="fav-list" id="favList"></div>
    <button class="btn" id="gotoFirstBtn" style="margin-top:8px;">↺ К первой карточке</button>
</div>

<p class="kbd-hint">⌨ <span>←</span><span>→</span> переключение | <span>пробел</span> переворот</p>

<script>
(function() {
    const allWords = [
        ['你好','nǐ hǎo','Здравствуй(те)'],['是','shì','быть'],['老师','lǎo shī','учитель'],
        ['学生','xué sheng','ученик'],['谢谢','xiè xie','спасибо'],['不客气','bú kè qi','пожалуйста'],
        ['对不起','duì bu qǐ','извините'],['没关系','méi guān xi','ничего страшного'],
        ['中国','zhōng guó','Китай'],['美国','měi guó','США'],['英国','yīng guó','Англия'],
        ['俄罗斯','é luó sī','Россия'],['法国','fǎ guó','Франция'],['日本','rì běn','Япония'],
        ['韩国','hán guó','Корея'],['加拿大','jiā ná dà','Канада'],
        ['澳大利亚','ào dà lì yà','Австралия'],['北京','běi jīng','Пекин'],
        ['莫斯科','mò sī kē','Москва'],['上海','shàng hǎi','Шанхай'],
        ['家','jiā','дом'],['爸爸','bà ba','папа'],['妈妈','mā ma','мама'],
        ['哥哥','gē ge','старший брат'],['姐姐','jiě jie','старшая сестра'],
        ['弟弟','dì di','младший брат'],['妹妹','mèi mei','младшая сестра'],
        ['喜欢','xǐ huān','нравиться'],['热','rè','жаркий'],['冷','lěng','холодный'],
        ['水','shuǐ','вода'],['火','huǒ','огонь'],['书','shū','книга'],
        ['音乐','yīn yuè','музыка'],['朋友','péng you','друг']
    ];

    const uniqueWords = [];
    const seen = new Set();
    for (const w of allWords) if (!seen.has(w[0])) { seen.add(w[0]); uniqueWords.push(w); }

    let favorites = JSON.parse(localStorage.getItem('flashcardFavorites') || '[]');
    let mode = 'all';
    let currentIndex = 0;
    let isFlipped = false;

    const cardInner = document.getElementById('cardInner');
    const charDisplay = document.getElementById('charDisplay');
    const charSm = document.getElementById('charSm');
    const pinyinDisplay = document.getElementById('pinyinDisplay');
    const transDisplay = document.getElementById('transDisplay');
    const counter = document.getElementById('counter');
    const progressFill = document.getElementById('progressFill');
    const favoriteBtn = document.getElementById('favoriteBtn');
    const favoritesListContainer = document.getElementById('favoritesListContainer');
    const favList = document.getElementById('favList');
    const gamePanel = document.getElementById('gamePanel');
    const gameChar = document.getElementById('gameChar');
    const optionsContainer = document.getElementById('optionsContainer');
    const gameScore = document.getElementById('gameScore');

    let gameScoreCount = 0;

    function getCurrentWordList() { return mode === 'all' ? uniqueWords : favorites; }
    function getCurrentWord() { const list = getCurrentWordList(); return list[currentIndex] || null; }

    function charSizeClass(hanzi) {
        const len = hanzi.length;
        if (len <= 2) return '';
        if (len <= 4) return 'multi';
        return 'long';
    }

    function updateFavoriteButton() {
        const word = getCurrentWord();
        if (!word) return;
        const isFav = favorites.some(w => w[0] === word[0]);
        favoriteBtn.textContent = isFav ? '★' : '☆';
        favoriteBtn.classList.toggle('active', isFav);
    }

    function renderCard() {
        const word = getCurrentWord();
        if (!word) {
            charDisplay.textContent = '—'; charSm.textContent = '';
            pinyinDisplay.textContent = 'Нет слов'; transDisplay.textContent = '';
            counter.textContent = '0 / 0'; progressFill.style.width = '0%';
            favoriteBtn.style.display = 'none';
            renderFavoritesList();
            return;
        }
        favoriteBtn.style.display = 'block';
        charDisplay.textContent = word[0];
        charDisplay.className = 'char ' + charSizeClass(word[0]);
        charSm.textContent = word[0];
        pinyinDisplay.textContent = word[1];
        transDisplay.textContent = word[2];
        const list = getCurrentWordList();
        counter.textContent = `${currentIndex+1}/${list.length}`;
        progressFill.style.width = list.length ? ((currentIndex+1)/list.length*100)+'%' : '0%';
        isFlipped = false; cardInner.classList.remove('flipped');
        updateFavoriteButton();
        renderFavoritesList();
    }

    function flipCard() { if (!getCurrentWord()) return; isFlipped = !isFlipped; cardInner.classList.toggle('flipped', isFlipped); }
    function goToCard(index) {
        const list = getCurrentWordList();
        if (!list.length) { currentIndex = 0; renderCard(); return; }
        if (index < 0) index = list.length - 1;
        if (index >= list.length) index = 0;
        currentIndex = index; renderCard();
    }

    function switchMode(newMode) {
        if (mode === newMode) return;
        mode = newMode; currentIndex = 0;
        document.querySelectorAll('.mode-btn').forEach(b => b.classList.toggle('active', b.dataset.mode === mode));
        favoritesListContainer.classList.toggle('visible', mode === 'favorites');
        gamePanel.classList.remove('active');
        renderCard();
    }

    function toggleFavorite() {
        const word = getCurrentWord();
        if (!word) return;
        const idx = favorites.findIndex(w => w[0] === word[0]);
        if (idx === -1) favorites.push([...word]);
        else favorites.splice(idx, 1);
        localStorage.setItem('flashcardFavorites', JSON.stringify(favorites));
        updateFavoriteButton();
        if (mode === 'favorites') {
            if (!favorites.length) currentIndex = 0;
            else if (currentIndex >= favorites.length) currentIndex = favorites.length - 1;
        }
        renderCard();
    }

    function renderFavoritesList() {
        if (mode !== 'favorites') { favList.innerHTML = ''; return; }
        favList.innerHTML = favorites.length ? favorites.map((w,i) => {
            const active = (i === currentIndex);
            return `<div class="fav-item" data-fav-index="${i}" style="${active?'background:#fce4d6':''}">
                <span class="fav-char">${w[0]}</span>
                <span class="fav-pinyin">${w[1]}</span>
                <span class="remove-fav" data-remove="${i}">✕</span>
            </div>`;
        }).join('') : '<div style="color:#b0a090; padding:10px;">⭐ Нет сохранённых слов</div>';
    }

    // Игра
    function changeTone(syllable, newTone) {
        const vowels = 'aeiouüAEIOUÜ';
        let result = syllable.replace(/[āáǎàēéěèīíǐìōóǒòūúǔùǖǘǚǜ]/g, (c) => {
            const base = c.normalize('NFD').replace(/[\u0300-\u036f]/g, '');
            const map = { 'a':['ā','á','ǎ','à'], 'e':['ē','é','ě','è'], 'i':['ī','í','ǐ','ì'],
                          'o':['ō','ó','ǒ','ò'], 'u':['ū','ú','ǔ','ù'], 'ü':['ǖ','ǘ','ǚ','ǜ'] };
            return map[base]?.[parseInt(newTone)-1] || base;
        });
        if (result === syllable) {
            const base = syllable.normalize('NFD').replace(/[\u0300-\u036f]/g, '');
            const lastVowel = [...base].filter(c => 'aeiouü'.includes(c)).pop();
            if (lastVowel) {
                const map = { 'a':['ā','á','ǎ','à'], 'e':['ē','é','ě','è'], 'i':['ī','í','ǐ','ì'],
                              'o':['ō','ó','ǒ','ò'], 'u':['ū','ú','ǔ','ù'], 'ü':['ǖ','ǘ','ǚ','ǜ'] };
                const withTone = map[lastVowel]?.[parseInt(newTone)-1] || lastVowel;
                return base.replace(lastVowel, withTone);
            }
        }
        return result;
    }

    function generateFakePinyin(correctPinyin) {
        const syllables = correctPinyin.split(' ');
        const tones = ['1','2','3','4','0'];
        return syllables.map(s => {
            const currentTone = [...s].some(c => 'āáǎàēéěèīíǐìōóǒòūúǔùǖǘǚǜ'.includes(c)) ?
                (s.match(/[āáǎà]/)? '1' : s.match(/[ēéěè]/)? '2' : s.match(/[īíǐì]/)? '3' : s.match(/[ōóǒò]/)? '4' : '0') : '0';
            const otherTones = tones.filter(t => t !== currentTone);
            const newTone = otherTones[Math.floor(Math.random() * otherTones.length)];
            return changeTone(s, newTone);
        }).join(' ');
    }

    function startGame() {
        if (!favorites.length) return;
        gamePanel.classList.add('active');
        gameScoreCount = 0;
        nextGameWord();
    }

    function nextGameWord() {
        if (!favorites.length) return;
        const randomIndex = Math.floor(Math.random() * favorites.length);
        const word = favorites[randomIndex];
        const correctPinyin = word[1];
        gameChar.textContent = word[0];

        const options = new Set();
        options.add(correctPinyin);
        while (options.size < 4) {
            let fake = generateFakePinyin(correctPinyin);
            if (!options.has(fake)) options.add(fake);
        }
        const shuffled = shuffle([...options]);
        optionsContainer.innerHTML = shuffled.map(opt =>
            `<button class="option-btn" data-pinyin="${opt}">${opt}</button>`
        ).join('');
        gameScore.textContent = `Правильных: ${gameScoreCount}`;

        optionsContainer.querySelectorAll('.option-btn').forEach(btn => {
            btn.addEventListener('click', function(e) {
                if (this.dataset.pinyin === correctPinyin) {
                    this.classList.add('correct');
                    gameScoreCount++;
                    gameScore.textContent = `✅ Правильно! Счёт: ${gameScoreCount}`;
                    setTimeout(nextGameWord, 800);
                } else {
                    this.classList.add('wrong');
                    gameScore.textContent = `❌ Ошибка. Правильно: ${correctPinyin}`;
                    setTimeout(nextGameWord, 1200);
                }
            });
        });
    }

    function shuffle(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    document.getElementById('toggleGameBtn').addEventListener('click', () => {
        gamePanel.classList.toggle('active');
        if (gamePanel.classList.contains('active')) startGame();
    });

    document.getElementById('cardStage').addEventListener('click', e => { if (!e.target.closest('.favorite-btn')) flipCard(); });
    favoriteBtn.addEventListener('click', e => { e.stopPropagation(); toggleFavorite(); });
    document.getElementById('btnFlip').addEventListener('click', flipCard);
    document.getElementById('btnPrev').addEventListener('click', () => goToCard(currentIndex-1));
    document.getElementById('btnNext').addEventListener('click', () => goToCard(currentIndex+1));
    document.getElementById('gotoFirstBtn').addEventListener('click', () => { if (favorites.length) goToCard(0); });
    document.querySelectorAll('.mode-btn').forEach(b => b.addEventListener('click', () => switchMode(b.dataset.mode)));
    favList.addEventListener('click', e => {
        const rm = e.target.closest('.remove-fav');
        if (rm) {
            const idx = parseInt(rm.dataset.remove);
            favorites.splice(idx, 1);
            localStorage.setItem('flashcardFavorites', JSON.stringify(favorites));
            if (mode === 'favorites') {
                if (!favorites.length) currentIndex = 0;
                else if (currentIndex >= favorites.length) currentIndex = favorites.length-1;
            }
            renderCard();
            return;
        }
        const item = e.target.closest('.fav-item');
        if (item) { const idx = parseInt(item.dataset.favIndex); goToCard(idx); }
    });

    document.addEventListener('keydown', e => {
        if (e.key === 'ArrowLeft') { e.preventDefault(); goToCard(currentIndex-1); }
        else if (e.key === 'ArrowRight') { e.preventDefault(); goToCard(currentIndex+1); }
        else if (e.key === ' ' || e.code === 'Space') { e.preventDefault(); flipCard(); }
    });

    if (mode === 'favorites') favoritesListContainer.classList.add('visible');
    renderCard();
})();
</script>
</body>
</html>
